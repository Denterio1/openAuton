# config/agent_dna.yaml
# Initial cognitive DNA – genes that guide agent behavior

version: "1.0"
genes:
  - name: prefer_deeper_network
    gene_type: architecture
    value: {"depth_increment": 2}
    confidence: 0.7
    dominance: dominant
    source_episodes: []

  - name: use_contrastive_loss
    gene_type: objective
    value: {"loss_type": "contrastive", "weight": 0.3}
    confidence: 0.6
    dominance: recessive
    source_episodes: []

  - name: low_hallucination_penalty
    gene_type: training_schedule
    value: {"hallucination_weight": 0.2}
    confidence: 0.8
    dominance: dominant
    source_episodes: []

  - name: use_history_retrieval
    gene_type: meta_strategy
    value: {"history_weight": 0.7}
    confidence: 0.9
    dominance: dominant
    source_episodes: []